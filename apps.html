<title>My Apps</title>
<style>
  /* Home hub: one installable app, a tab per back-end service on this
     workstation. Each tab is the existing app page in an iframe — no backend
     change. Bottom tab bar for thumb reach; dark; zero external assets. */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #111; color: #eee; overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex; flex-direction: column;
  }
  /* app views fill everything above the tab bar */
  #views { position: relative; flex: 1; min-height: 0; }
  .view {
    position: absolute; inset: 0; display: none;
    border: 0; width: 100%; height: 100%; background: #111;
  }
  .view.active { display: block; }
  /* placeholder shown when a tab has no URL set */
  .empty {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; text-align: center; padding: 28px; color: #bbb;
  }
  .empty.active { display: flex; }
  .empty h2 { font-size: 22px; color: #eee; font-weight: 600; }
  .empty p { font-size: 16px; line-height: 1.5; max-width: 440px; }
  .empty button, #settings button {
    background: #2b6cb0; color: #fff; border: 0; border-radius: 12px;
    font-size: 18px; padding: 13px 20px; cursor: pointer;
  }
  /* bottom tab bar */
  #tabs {
    display: flex; background: #1b1b1b; border-top: 1px solid #2a2a2a;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  #tabs button {
    flex: 1; background: none; border: 0; color: #8a8a8a; cursor: pointer;
    padding: 10px 4px 12px; font-size: 12px; display: flex; flex-direction: column;
    align-items: center; gap: 3px; touch-action: manipulation;
  }
  #tabs button .ic { font-size: 24px; line-height: 1; }
  #tabs button.sel { color: #4a90e2; }
  #tabs button.gear { flex: 0 0 64px; }
  /* settings sheet */
  #settings {
    position: absolute; inset: 0; z-index: 10; display: none;
    flex-direction: column; background: #141414; padding: 22px;
    overflow-y: auto; gap: 6px;
  }
  #settings.open { display: flex; }
  #settings h1 { font-size: 22px; margin-bottom: 6px; }
  #settings p.note { font-size: 14px; color: #999; line-height: 1.5; margin-bottom: 10px; }
  #settings label { display: block; font-size: 14px; color: #aaa; margin: 14px 0 5px; }
  #settings input {
    width: 100%; font-size: 16px; padding: 12px; border-radius: 10px;
    border: 1px solid #444; background: #222; color: #eee;
  }
  #settings .row { display: flex; gap: 12px; margin-top: 20px; }
  #settings .row button.secondary { background: #333; }
  /* error banner (the hub had no error surface before) */
  #banner {
    display: none; background: #4a1f1c; color: #ffb4a8; font-size: 14px;
    padding: 10px 14px; line-height: 1.4; white-space: pre-wrap; cursor: pointer;
    border-bottom: 1px solid #6b2a25;
  }
  #banner.show { display: block; }
</style>
</head>
<body>

<div id="banner"></div>
<div id="views"></div>

<div id="settings">
  <h1>Apps</h1>
  <p class="note">Each tab loads one app page. The first two live on this site;
    reMarkable runs on its own address (set it to your Tailscale URL for that
    service). Blank a URL to hide its tab. Saved in this browser.</p>
  <div id="settingsFields"></div>
  <div class="row">
    <button id="saveApps">Save</button>
    <button id="closeSettings" class="secondary">Cancel</button>
  </div>
</div>

<nav id="tabs"></nav>

<script>
"use strict";
(function () {
  var $ = function (id) { return document.getElementById(id); };

  // ---- error visibility -------------------------------------------------
  // The hub had no error surface. Show errors in a banner AND ship them to the
  // bridge's /api/clientlog (same origin as the assistant page, so the bridge
  // URL + token it saved are in our localStorage) so they're readable on the
  // workstation in ~/.config/tesla-bridge/client-errors.log.
  function reportError(source, message) {
    try {
      var bridge = (localStorage.getItem("tb_bridge") || "").replace(/\/+$/, "");
      var token = localStorage.getItem("tb_token") || "";
      if (bridge && token) {
        fetch(bridge + "/api/clientlog", {
          method: "POST",
          headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
          body: JSON.stringify({ source: source, message: String(message).slice(0, 900), ua: navigator.userAgent })
        }).catch(function () {});
      }
    } catch (e) {}
  }
  function showBanner(text) {
    var b = $("banner");
    b.textContent = "⚠ " + text + "  (tap to dismiss)";
    b.className = "show";
  }
  var banner = document.getElementById("banner");
  if (banner) banner.onclick = function () { banner.className = ""; };
  window.addEventListener("error", function (e) {
    var m = (e.message || "error") + " @ " + (e.filename || "") + ":" + (e.lineno || 0);
    reportError("apps.html", m); showBanner(m);
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e.reason; var m = "unhandledrejection: " + ((r && r.message) || r || "");
    reportError("apps.html", m); showBanner(m);
  });

  // Each app is the EXISTING page in an iframe — no backend change. URLs are
  // editable + persisted so this doubles as a launcher for anything you add.
  var DEFAULTS = [
    { id: "assistant",  label: "Assistant",  icon: "🤖", url: "./tesla-assistant.html" },
    { id: "translate",  label: "Translate",  icon: "🌐", url: "./live-translator.html" },
    { id: "remarkable", label: "reMarkable", icon: "📝",
      url: "https://harlan-b550-aorus-pro-ac.taila21a91.ts.net:9443/" }
  ];
  var REMARKABLE_HINT = "https://your-machine.your-tailnet.ts.net:9443/";

  function loadUrls() {
    var saved = {};
    try { saved = JSON.parse(localStorage.getItem("hub_urls") || "{}"); } catch (e) {}
    return DEFAULTS.map(function (a) {
      var u = saved[a.id];
      return { id: a.id, label: a.label, icon: a.icon,
               url: (u === undefined ? a.url : u) };
    });
  }
  function saveUrls(apps) {
    var m = {};
    apps.forEach(function (a) { m[a.id] = a.url; });
    try { localStorage.setItem("hub_urls", JSON.stringify(m)); } catch (e) {}
  }

  var apps = loadUrls();
  var active = null;
  try { active = localStorage.getItem("hub_active"); } catch (e) {}

  // Build the views (lazy: iframe src is set only when a tab is first shown, so
  // three mics / websockets / pollers don't all start at once) and tab bar.
  function build() {
    var views = $("views"); views.innerHTML = "";
    var tabs = $("tabs"); tabs.innerHTML = "";
    apps.forEach(function (a) {
      if (a.url) {
        var f = document.createElement("iframe");
        f.className = "view"; f.id = "view-" + a.id;
        f.setAttribute("allow", "microphone; autoplay; clipboard-write; clipboard-read; fullscreen");
        f.dataset.src = a.url;   // real src set on first activation
        views.appendChild(f);
      } else {
        var e = document.createElement("div");
        e.className = "empty"; e.id = "view-" + a.id;
        e.innerHTML = "<h2>" + a.icon + " " + a.label + "</h2>" +
          "<p>No address set for this app yet. Open settings and paste its URL " +
          "(for reMarkable, that's the Tailscale address of its bridge).</p>";
        var b = document.createElement("button");
        b.textContent = "Open settings";
        b.onclick = function () { openSettings(true); };
        e.appendChild(b);
        views.appendChild(e);
      }
      var t = document.createElement("button");
      t.id = "tab-" + a.id;
      t.innerHTML = '<span class="ic">' + a.icon + '</span>' + a.label;
      t.onclick = function () { show(a.id); };
      tabs.appendChild(t);
    });
    var gear = document.createElement("button");
    gear.className = "gear";
    gear.innerHTML = '<span class="ic">⚙️</span>Settings';
    gear.onclick = function () { openSettings(true); };
    tabs.appendChild(gear);

    // pick the active tab: saved one if still present, else the first
    var ids = apps.map(function (a) { return a.id; });
    if (ids.indexOf(active) < 0) active = ids[0];
    show(active);
  }

  // Report a tab that fails to load or never finishes (e.g. its tailnet
  // backend is unreachable). Cross-origin frames won't reveal their internal
  // error, but "did it load at all" is the signal we need.
  function watchIframeLoad(frame, app) {
    var done = false;
    var timer = setTimeout(function () {
      if (done) return;
      var m = app.label + " tab did not load (" + app.url + ") — is Tailscale on?";
      reportError("apps.html/" + app.id, m); showBanner(m);
    }, 12000);
    frame.addEventListener("load", function () { done = true; clearTimeout(timer); });
    frame.addEventListener("error", function () {
      done = true; clearTimeout(timer);
      var m = app.label + " tab failed to load (" + app.url + ")";
      reportError("apps.html/" + app.id, m); showBanner(m);
    });
  }

  function show(id) {
    active = id;
    try { localStorage.setItem("hub_active", id); } catch (e) {}
    apps.forEach(function (a) {
      var v = $("view-" + a.id), t = $("tab-" + a.id);
      var on = a.id === id;
      if (v) {
        // set iframe src on first show (lazy), then just toggle visibility
        if (on && v.tagName === "IFRAME" && !v.src && v.dataset.src) {
          watchIframeLoad(v, a);
          v.src = v.dataset.src;
        }
        v.classList.toggle("active", on);
      }
      if (t) t.classList.toggle("sel", on);
    });
  }

  // ---- settings ----
  function openSettings(open) {
    if (open) {
      var wrap = $("settingsFields"); wrap.innerHTML = "";
      apps.forEach(function (a) {
        var lab = document.createElement("label");
        lab.textContent = a.label + " URL";
        var inp = document.createElement("input");
        inp.id = "url-" + a.id; inp.value = a.url;
        inp.autocapitalize = "off"; inp.spellcheck = false;
        inp.placeholder = a.id === "remarkable" ? REMARKABLE_HINT : "https://…";
        wrap.appendChild(lab); wrap.appendChild(inp);
      });
    }
    $("settings").classList.toggle("open", open);
  }
  $("saveApps").onclick = function () {
    apps.forEach(function (a) {
      var v = ($("url-" + a.id).value || "").trim().replace(/\s+/g, "");
      a.url = v;
    });
    saveUrls(apps);
    openSettings(false);
    build();   // rebuild tabs/views with the new URLs (fresh iframes)
  };
  $("closeSettings").onclick = function () { openSettings(false); };

  build();
})();
</script>
</body>
</html>
